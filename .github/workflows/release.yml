name: Release

# Publish the sandboxed pipeline image to GHCR on version tags. The image
# holds code only (data mounts at /data — see Dockerfile/compose.yaml), so
# publishing can never ship Hansard text. Tag-triggered deliberately: a
# release is an act, not every push to main.
#
#   git tag v0.1.0 && git push origin v0.1.0
#   -> ghcr.io/parliament-io/hansard-researcher:0.1.0, :0.1, :latest

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # image tags must never drift from the package version
      - name: Check tag matches pyproject version
        run: |
          version=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match pyproject version $version"
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        # provenance/SBOM make the push an OCI image index, and the GHCR
        # package page reads its description from *index-level* annotations —
        # image labels alone are invisible there (description text comes from
        # the GitHub repo description)
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # SLSA provenance + SPDX SBOM attached as registry attestations
          # (inspect: docker buildx imagetools inspect <image> --format
          # '{{ json .Provenance }}' / '{{ json .SBOM }}')
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
