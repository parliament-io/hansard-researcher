name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q
      - name: Schema drift check
        run: |
          uv run hansard-researcher schema --out /tmp/canonical.schema.json
          diff /tmp/canonical.schema.json schemas/canonical.schema.json
