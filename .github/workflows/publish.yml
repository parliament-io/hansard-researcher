name: Publish

# Dashboard build + Pages deploy from published derived artifacts.
#
# The data pipeline (harvest -> normalize -> enrich -> aggregate) runs locally
# via scripts/daily_publish.ps1: the raw/silver archive (500k+ files of
# Hansard text — see LICENSES-DATA.md) and the GPU enrichment stages cannot
# live on a runner. The local run uploads gold parquet + hansard.duckdb to the
# rolling `data-latest` release, then dispatches this workflow. The runner
# only ever sees derived facts.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download derived DuckDB (data-latest release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download data-latest \
            --repo "$GITHUB_REPOSITORY" \
            --pattern hansard.duckdb \
            --dir dashboards/sources/hansard \
            --clobber

      - name: Build dashboards
        working-directory: dashboards
        run: |
          npm ci --no-audit --no-fund
          npm run sources
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboards/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
