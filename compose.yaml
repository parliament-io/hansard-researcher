# hansard-researcher in a sandbox: the image holds only code; the existing local
# archive (./data, ~4.5 GB raw) is bind-mounted at /data (the CLI reads
# HANSARD_RESEARCHER_DATA_DIR, so no --data-dir needed).
#
#   docker compose build
#   docker compose run --rm pipeline normalize wa --workers 8   # no network
#   docker compose run --rm pipeline aggregate
#   docker compose run --rm pipeline db --out /data/hansard.duckdb
#   docker compose run --rm harvest harvest wa --start 2026-06-01 --end 2026-07-03 --refresh-window 45
#
# `pipeline` is the sandboxed default: no network, read-only root filesystem,
# all capabilities dropped — it can only read/write the mounted data volume.
# `harvest` is identical but with network access (it must reach the
# parliament APIs); use it only for the harvest stage.

x-base: &base
  build: .
  # published on version tags (release.yml); local builds get the same name so
  # you test what ships. Consumers: `docker compose pull pipeline` skips the
  # build; pin a release with HANSARD_RESEARCHER_TAG=0.0.1
  image: ghcr.io/parliament-io/hansard-researcher:${HANSARD_RESEARCHER_TAG:-latest}
  init: true # reap normalize's worker processes on Ctrl+C
  volumes:
    - ./data:/data
  read_only: true
  tmpfs:
    - /tmp # DuckDB/pyarrow scratch space
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  pipeline:
    <<: *base
    network_mode: none

  harvest:
    <<: *base

  # Optional local AI services for Tier 3 (--profile enrich): Ollama serves
  # models, Qdrant serves vector search. Both publish on localhost only, so
  # the host pipeline (`uv run hansard-researcher ...`) can use them directly:
  #
  #   docker compose --profile enrich up -d
  #   docker compose exec ollama ollama pull nomic-embed-text
  #   uv run hansard-researcher enrich embed wa --provider ollama
  #   uv run hansard-researcher enrich index wa --provider ollama
  #   uv run hansard-researcher enrich search "housing" --provider ollama --backend qdrant
  #
  # Fully sandboxed alternative: the `enrich` service reaches both over the
  # internal-only network and has no route to the internet:
  #
  #   docker compose --profile enrich run --rm enrich enrich embed wa
  ollama:
    image: ollama/ollama
    profiles: [enrich, ollama, api]
    networks: [default, enrich] # default so `ollama pull` can fetch models
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "16"  # embed batches are small; nomic is 323 MB on a 24 GB GPU
    # use the host NVIDIA GPU when present (Docker Desktop: enable GPU
    # support). Without one, compose fails the reservation — comment out
    # to fall back to CPU inference.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant
    profiles: [enrich, qdrant, api]
    networks: [default, enrich] # default is required to publish the port
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant-storage:/qdrant/storage

  enrich:
    <<: *base
    profiles: [enrich, ollama]
    networks: [enrich] # internal-only: no route out
    environment:
      HANSARD_RESEARCHER_ENRICH_PROVIDER: ollama
      HANSARD_RESEARCHER_ENRICH_BASE_URL: http://ollama:11434/v1
      HANSARD_RESEARCHER_QDRANT_URL: http://qdrant:6333

  # Tier 2 hosted search API (--profile api): metadata + official-source
  # links only, never prose. Deliberately NO /data mount — the container
  # cannot leak silver even if compromised; results are built entirely from
  # Qdrant payloads, queries are embedded by the ollama service. This
  # service is the VPS deployment unit: in production put Caddy/nginx (TLS,
  # rate limits) in front of 8722 and keep Qdrant unpublished.
  #
  #   docker compose --profile api up -d
  #   curl "http://localhost:8722/search?q=housing+affordability&k=5"
  api:
    build: .
    image: ghcr.io/parliament-io/hansard-researcher:${HANSARD_RESEARCHER_TAG:-latest}
    profiles: [api]
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks: [default, enrich] # default only to publish the port
    ports:
      - "127.0.0.1:8722:8722"
    environment:
      HANSARD_RESEARCHER_ENRICH_PROVIDER: ollama
      HANSARD_RESEARCHER_ENRICH_BASE_URL: http://ollama:11434/v1
      HANSARD_RESEARCHER_QDRANT_URL: http://qdrant:6333
    command: ["api", "--host", "0.0.0.0", "--port", "8722"]
    depends_on:
      - ollama
      - qdrant

networks:
  enrich:
    internal: true

volumes:
  ollama-models:
  qdrant-storage:
