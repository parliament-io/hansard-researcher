    name: Justice and Home Affairs
    description: Courts, policing, prisons, community justice, civil law.
  - id: local-government
    name: Local Government
    description: Councils, local services, planning, community planning partnerships.
  - id: petitions
    procedural: true
    name: Petitions
    description: Public petitions submitted to the Parliament.
  - id: procedural-matters
    procedural: true
    name: Procedural Matters
    description: Standing Orders, points of order, Presiding Officer's rulings.
  - id: question-time
    procedural: true
    name: Question Time
    description: First Minister's Questions, portfolio and topical questions.
  - id: social-justice-social-security
    name: Social Justice and Social Security
    description: Social security, tackling poverty, welfare devolution.
  - id: sport-recreation
    name: Sport and Recreation
    description: Sport funding, major events, community recreation.
