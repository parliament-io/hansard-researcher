    name: Agriculture and Rural Economy
    description: Farming, crofting, fisheries, forestry, rural and island communities.
  - id: bills-legislation
    procedural: true
    name: Bills and Legislation
    description: Stage debate on bills, amendments, the legislative process.
  - id: children-young-people
    name: Children and Young People
    description: Child wellbeing, looked-after children, youth services, family support.
  - id: climate-net-zero
    name: Climate and Net Zero
    description: Emissions reduction, climate policy, just transition.
  - id: constitution-external-affairs
    name: Constitution and External Affairs
    description: Devolution, intergovernmental relations, European and international affairs.
  - id: culture-heritage
    name: Culture and Heritage
    description: Arts, creative industries, museums, Gaelic and Scots languages, heritage.
  - id: economy-fair-work
    name: Economy and Fair Work
    description: Industry, business support, employment, fair work, wages.
  - id: education-skills
    name: Education and Skills
    description: Schools, curriculum, colleges, universities, skills and training.
  - id: energy-resources
    name: Energy and Resources
    description: Electricity, renewables, oil and gas, hydrogen, resource policy.
  - id: environment-land-reform
    name: Environment and Land Reform
    description: Environmental protection, biodiversity, land reform, water.
  - id: equalities-human-rights
    name: Equalities and Human Rights
    description: Equality, human rights, gender equality, tackling discrimination.
